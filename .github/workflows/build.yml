name: Build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    container: texlive/texlive:latest
    steps:
      - uses: actions/checkout@v7

      - name: Build resume.pdf
        run: make

      - name: Upload PDF
        uses: actions/upload-artifact@v7
        with:
          name: resume
          path: resume.pdf
